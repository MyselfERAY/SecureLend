name: Article Agent - SEO Blog Content

on:
  schedule:
    - cron: '0 7 * * 2,4'     # Tuesday & Thursday at 07:00 UTC (10:00 Turkey)
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific article topic (leave empty for auto-pick)'
        required: false
        default: ''
      audience:
        description: 'Target audience'
        required: false
        default: 'BOTH'
        type: choice
        options:
          - BOTH
          - TENANT
          - LANDLORD

env:
  API_BASE: https://securelend-production.up.railway.app

concurrency:
  group: securelend-article
  cancel-in-progress: false

jobs:
  article-generation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Create Agent Run
        id: run
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          RUN_RESPONSE=$(curl -s -X POST \
            -H "x-api-key: $SERVICE_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"agentType":"MARKETING"}' \
            "$API_BASE/api/v1/agent-runs")

          RUN_ID=$(echo "$RUN_RESPONSE" | jq -r '.data.id // empty')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Fetch existing articles (full context)
        id: existing
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          # Get ALL existing articles — titles, categories, slugs
          ARTICLES=$(curl -s -H "x-api-key: $SERVICE_API_KEY" \
            "$API_BASE/api/v1/articles/admin/all")

          # Full title list for dedup
          echo "$ARTICLES" | jq -r '[.data[]? | "\(.category // "Genel") — \(.title // "")"] | join("\n")' \
            2>/dev/null > /tmp/existing_articles.txt || echo "" > /tmp/existing_articles.txt

          # Category distribution
          echo "$ARTICLES" | jq -r '[.data[]?.category // "Genel"] | group_by(.) | map({category: .[0], count: length}) | .[] | "\(.category): \(.count) makale"' \
            2>/dev/null > /tmp/category_dist.txt || echo "" > /tmp/category_dist.txt

          # Slug list (to avoid collision)
          echo "$ARTICLES" | jq -r '[.data[]?.slug // ""] | join("\n")' \
            2>/dev/null > /tmp/existing_slugs.txt || echo "" > /tmp/existing_slugs.txt

          TOTAL=$(echo "$ARTICLES" | jq '[.data[]?] | length' 2>/dev/null || echo "0")
          echo "::notice::Existing articles: $TOTAL"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate article
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MANUAL_TOPIC="${{ github.event.inputs.topic }}"
          AUDIENCE="${{ github.event.inputs.audience }}"
          if [ -z "$AUDIENCE" ]; then AUDIENCE="BOTH"; fi
          EXISTING=$(cat /tmp/existing_articles.txt)
          CATEGORY_DIST=$(cat /tmp/category_dist.txt)
          EXISTING_SLUGS=$(cat /tmp/existing_slugs.txt)
          TODAY=$(date -u +%Y-%m-%d)

          PROMPT="Sen SecureLend (kiraguvence.com) icin icerik pazarlama yazarisin. Turk fintech kira odeme ve KMH platformu.

          /rehber bolumu icin yuksek kaliteli, SEO uyumlu bir blog makalesi uret.

          == MEVCUT MAKALELER (BU KONULARI TEKRARLAMA!) ==
          $EXISTING

          == KATEGORI DAGILIMI (az olan kategorilere oncelik ver) ==
          $CATEGORY_DIST

          == MEVCUT SLUG'LAR (bunlarla carpisma!) ==
          $EXISTING_SLUGS

          == MANUEL KONU ISTEGI ==
          $(if [ -n "$MANUAL_TOPIC" ]; then echo "Su konu hakkinda yaz: $MANUAL_TOPIC"; else echo "Asagidaki kategorilerden otomatik sec. Az icerigi olan kategorilere oncelik ver."; fi)

          == HEDEF KITLE ==
          $AUDIENCE (TENANT = kiraci, LANDLORD = ev sahibi, BOTH = herkes)

          == KONU KATEGORILERI ==
          1. Kiracinin Haklari — kiraci haklari, depozito kurallari, tahliye sureci, TBK m.299-378
          2. Ev Sahibinin Haklari — ev sahibi haklari, kira gelir vergisi, sozlesme feshi, tahliye
          3. Kira Sozlesmesi — kira sozlesmesi ipuclari, maddeler, yasal gereklilikler, islak imza
          4. Finansal Rehber — kira butceleme, KMH avantajlari, kredi notu
          5. Guvenli Odeme — KMH ile otomatik kira odeme, banka talimati, dijital odeme
          6. Hukuki Bilgi — Turk kira hukuku (6098 TBK), uyusmazlik cozumu, arabuluculuk
          7. Emlak Piyasasi — kira piyasasi trendleri, il bazli karsilastirma, 2025-2026 analizi
          8. Dijital Donusum — proptech, fintech, dijital sozlesmeler, KiraGuvence platformu
          9. KMH Rehberi — KMH nedir, nasil acilir, kira odemede avantajlari, banka karsilastirma
          10. Depozito ve Teminat — iade sureci, yasal haklar, TBK m.342 siniri, banka teminati
          11. Vergi ve Muhasebe — kira gelir vergisi, beyanname, stopaj, gider indirimi
          12. Tasinma Rehberi — yeni eve tasinma listesi, adres degisikligi, abonelik transferi
          13. Sozlesme Feshi — kiraci fesih hakki, tahliye sebepleri, TBK m.347, ihtar surecleri
          14. Yatirim ve Portfoy — kira getirisi hesaplama, mulk yatirimi, pasif gelir stratejileri

          == KRITIK KURALLAR ==
          1. TEKRAR YASAGI: Yukaridaki mevcut makale listesiyle AYNI veya BENZER konuda yazma. Tamamen farkli bir acidan veya alt konudan yaz.
          2. KATEGORI DENGESI: Az icerigi olan kategorilere oncelik ver.
          3. SLUG BENZERSIZLIGI: Mevcut slug'larla catismayan, benzersiz bir slug sec.
          4. Turkce, dogal ve samimi dil kullan.
          5. 800-1500 kelime (content alani).
          6. Gercek Turk hukuk referanslari ekle (TBK madde numaralari, KVKK vb.).
          7. SEO: 'kira odeme', 'kira sozlesmesi', 'kiraci haklari', 'ev sahibi', 'guvenli kira', 'KMH', 'kiraguvence' anahtar kelimelerini dogal sekilde kullan.
          8. Paragraflar arasi \\n\\n kullan. Numarali listeler ve madde isaretleri ekle.
          9. Markdown KULLANMA (# ** yok). Sadece duz metin.
          10. SecureLend/kiraguvence.com'u dogal olarak 1-2 kez bahset — reklam degil, bilgilendirme olarak.
          11. Slug: a-z, 0-9, tire (-) — ozel karakter yok.

          == CIKTI FORMATI ==
          Sadece gecerli JSON dondur:
          {
            \"title\": \"Turkce makale basligi (cekici, SEO uyumlu, 40-80 karakter)\",
            \"slug\": \"url-uyumlu-slug-turkce\",
            \"summary\": \"2-3 cumlelik ozet (100-200 karakter, kart gorunumunde cikacak)\",
            \"content\": \"Tam makale icerigi...\",
            \"category\": \"Kategorilerden biri\",
            \"audience\": \"$AUDIENCE\"
          }"

          echo "=== Generating Article ==="
          RESULT=$(claude --print --dangerously-skip-permissions "$PROMPT" 2>&1)

          JSON_RESULT=$(echo "$RESULT" | sed -n '/^{/,/^}/p' | head -300)
          if [ -z "$JSON_RESULT" ]; then
            JSON_RESULT=$(echo "$RESULT" | sed -n '/```json/,/```/p' | grep -v '```')
          fi

          if [ -z "$JSON_RESULT" ]; then
            echo "::error::Failed to extract JSON"
            echo "generate_ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$JSON_RESULT" > /tmp/article.json
          echo "=== Generated Article ==="
          cat /tmp/article.json | jq '.title, .slug, .category' 2>/dev/null
          echo "generate_ok=true" >> $GITHUB_OUTPUT

      - name: Submit article as draft
        id: submit
        if: steps.generate.outputs.generate_ok == 'true'
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          # Build payload entirely within jq (avoids shell expansion issues with content)
          PAYLOAD=$(jq '{
            title: (.title // "Untitled"),
            slug: (.slug // "untitled"),
            summary: (.summary // ""),
            content: (.content // ""),
            category: (.category // "Rehber"),
            audience: (.audience // "BOTH")
          }' /tmp/article.json)

          RESPONSE=$(curl -s -X POST \
            -H "x-api-key: $SERVICE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$API_BASE/api/v1/articles")

          echo "$RESPONSE" | jq .

          if echo "$RESPONSE" | jq -e '.status == "success"' > /dev/null 2>&1; then
            ARTICLE_ID=$(echo "$RESPONSE" | jq -r '.data.id')
            echo "article_id=$ARTICLE_ID" >> $GITHUB_OUTPUT
            echo "submit_ok=true" >> $GITHUB_OUTPUT
            echo "::notice::Article created as DRAFT: $TITLE (id: $ARTICLE_ID)"
          else
            echo "::error::Failed to create article"
            echo "submit_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Complete agent run
        if: always()
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          RUN_ID="${{ steps.run.outputs.run_id }}"
          if [ -z "$RUN_ID" ]; then exit 0; fi

          if [ "${{ steps.submit.outputs.submit_ok }}" = "true" ]; then
            TITLE=$(cat /tmp/article.json | jq -r '.title // "article"')
            curl -s -X PATCH \
              -H "x-api-key: $SERVICE_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"status\":\"COMPLETED\",\"summary\":\"Article generated: $TITLE\"}" \
              "$API_BASE/api/v1/agent-runs/$RUN_ID"
          else
            curl -s -X PATCH \
              -H "x-api-key: $SERVICE_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"status":"FAILED","errorMessage":"Failed to generate article."}' \
              "$API_BASE/api/v1/agent-runs/$RUN_ID"
          fi
