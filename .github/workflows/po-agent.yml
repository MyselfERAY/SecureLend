name: PO Agent - Daily Report

on:
  schedule:
    - cron: '0 5 * * *'       # Every day at 05:00 UTC (08:00 Turkey)
  workflow_dispatch:            # Manual trigger

env:
  API_BASE: https://securelend-production.up.railway.app

concurrency:
  group: securelend-po
  cancel-in-progress: false

jobs:
  po-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Create Agent Run
        id: run
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          RUN_RESPONSE=$(curl -s -X POST \
            -H "x-api-key: $SERVICE_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"agentType":"PO"}' \
            "$API_BASE/api/v1/agent-runs")

          echo "$RUN_RESPONSE" | jq .

          RUN_ID=$(echo "$RUN_RESPONSE" | jq -r '.data.id // empty')
          if [ -z "$RUN_ID" ]; then
            echo "::warning::Could not create agent run. Continuing anyway."
            RUN_ID=""
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Fetch platform metrics
        id: metrics
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          METRICS=$(curl -s -H "x-api-key: $SERVICE_API_KEY" "$API_BASE/api/v1/po/metrics")
          echo "=== Current Metrics ==="
          echo "$METRICS" | jq .
          echo "$METRICS" > /tmp/metrics.json

      - name: Fetch agent context (previous reports, active items)
        id: context
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          CONTEXT=$(curl -s -H "x-api-key: $SERVICE_API_KEY" "$API_BASE/api/v1/po/agent-context")
          echo "=== Agent Context ==="
          echo "$CONTEXT" | jq '.data.recentItemTitles | length' 2>/dev/null || echo "No context"
          echo "$CONTEXT" > /tmp/context.json

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate PO Report
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          METRICS=$(cat /tmp/metrics.json)
          CONTEXT_RAW=$(cat /tmp/context.json)
          CONTEXT=$(echo "$CONTEXT_RAW" | jq -r '.data // empty')
          TODAY=$(date -u +%Y-%m-%d)
          DAY_OF_WEEK=$(echo "$CONTEXT" | jq -r '.dayOfWeek // "Monday"')

          # Extract context pieces
          RECENT_TITLES=$(echo "$CONTEXT" | jq -r '.recentItemTitles // [] | .[]' 2>/dev/null | head -50)
          ACTIVE_ITEMS=$(echo "$CONTEXT" | jq -r '.activeItems // [] | .[] | "- [\(.priority)] \(.title) (\(.daysOld) gun)"' 2>/dev/null | head -20)
          COMPLETED_DEV=$(echo "$CONTEXT" | jq -r '.completedDevTasks // [] | .[]' 2>/dev/null | head -10)
          PENDING_DEV=$(echo "$CONTEXT" | jq -r '.pendingDevTasks // [] | .[]' 2>/dev/null | head -10)
          CATEGORY_COUNTS=$(echo "$CONTEXT" | jq -r '.categoryCounts // {} | to_entries | .[] | "\(.key): \(.value)"' 2>/dev/null)
          PREV_METRICS=$(echo "$CONTEXT" | jq -r '.previousMetricsSnapshot // "yok"' 2>/dev/null)

          PROMPT="Sen SecureLend (kiraguvence.com) platformunun Product Owner (PO) ajanısın. Türk fintech kira ödeme ve KMH platformu.

          Tarih: $TODAY ($DAY_OF_WEEK)

          == GÜNCEL PLATFORM METRİKLERİ ==
          $METRICS

          == ÖNCEKİ GÜN METRİKLERİ (delta analizi için) ==
          $PREV_METRICS

          == SON 7 GÜNDE ÖNERİLEN BAŞLIKLAR (BUNLARI TEKRARLAMA!) ==
          $RECENT_TITLES

          == HÂLÂ AKTİF OLAN MADDELER (çözülmemiş) ==
          $ACTIVE_ITEMS

          == SON TAMAMLANAN GELİŞTİRMELER ==
          $COMPLETED_DEV

          == DEVAM EDEN GELİŞTİRMELER ==
          $PENDING_DEV

          == SON 7 GÜNDE KATEGORİ DAĞILIMI ==
          $CATEGORY_COUNTS

          == GÖREV ==
          Yukarıdaki bağlamı dikkatle inceleyerek BUGÜNE ÖZEL, TAZE bir PO raporu üret.

          KRİTİK KURALLAR:
          1. TEKRAR YASAĞI: 'SON 7 GÜNDE ÖNERİLEN BAŞLIKLAR' listesindeki hiçbir maddeyi tekrarlama. Aynı konuyu farklı kelimelerle de yazma. Tamamen yeni fikirler üret.
          2. AKTİF MADDE TAKIBI: 'HÂLÂ AKTİF' maddelerden bahsedebilirsin ama 'güncelleme' olarak — yeni madde olarak değil.
          3. METRİK DELTASı: Önceki günle kıyasla ne değişti? Artış/azalış varsa bunun üzerinde yorum yap.
          4. GÜN ODAĞI: Her gün farklı bir ana temaya odaklan:
             - Monday: Haftalık strateji ve büyüme
             - Tuesday: Rekabet analizi ve pazar araştırması
             - Wednesday: UX/UI ve kullanıcı deneyimi
             - Thursday: Teknik altyapı ve performans
             - Friday: Regülasyon ve hukuki uyumluluk
             - Saturday: Veri analizi ve metrik derinlemesine inceleme
             - Sunday: Gelecek hafta planlama ve önceliklendirme
          5. Bugün $DAY_OF_WEEK — bu günün temasına ağırlık ver ama diğer kategorilerden de 1-2 madde ekle.
          6. RAKIP ANALİZİ: Her raporda farklı bir rakip veya pazar trendi analiz et. Daha önce bahsedilenleri tekrarlama.
          7. 5-8 madde üret (10 değil — kalite > miktar).
          8. Her madde somut, uygulanabilir ve spesifik olmalı. Genel tavsiyeler verme.
          9. isDevTask=true sadece gerçekten kod değişikliği gerektiren maddeler için.
          10. Tamamlanan geliştirmelerin etkisini değerlendir (varsa).

          == ÇIKTI FORMATI ==
          Sadece geçerli JSON döndür (markdown yok, code fence yok):
          {
            \"summary\": \"<h2>PO Raporu — $TODAY</h2><p>... (Türkçe, HTML, maks 500 kelime, günün ana teması + metrik delta + önemli bulgular)</p>\",
            \"metricsSnapshot\": { ... metriklerin kopyası ... },
            \"items\": [
              {
                \"category\": \"UX_IMPROVEMENT|COMPETITOR_ANALYSIS|REGULATION_COMPLIANCE|FEATURE_SUGGESTION|BUG_REPORT\",
                \"title\": \"Kısa, spesifik başlık (maks 100 karakter)\",
                \"description\": \"Detaylı açıklama — neden önemli, nasıl uygulanmalı, beklenen etki\",
                \"priority\": \"LOW|MEDIUM|HIGH|CRITICAL\",
                \"isDevTask\": true/false
              }
            ]
          }"

          echo "=== Running Claude Code for PO Report ==="
          RESULT=$(claude --print --dangerously-skip-permissions "$PROMPT" 2>&1)

          # Extract JSON from response (handle potential markdown wrapping)
          JSON_RESULT=$(echo "$RESULT" | sed -n '/^{/,/^}/p' | head -200)

          if [ -z "$JSON_RESULT" ]; then
            # Try extracting from code fences
            JSON_RESULT=$(echo "$RESULT" | sed -n '/```json/,/```/p' | grep -v '```')
          fi

          if [ -z "$JSON_RESULT" ]; then
            echo "::error::Failed to extract JSON from Claude response"
            echo "$RESULT" | tail -50
            echo "generate_ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$JSON_RESULT" > /tmp/po_report.json
          echo "=== Generated Report ==="
          cat /tmp/po_report.json | jq . 2>/dev/null || cat /tmp/po_report.json | head -50
          echo "generate_ok=true" >> $GITHUB_OUTPUT

      - name: Submit report to API
        if: steps.generate.outputs.generate_ok == 'true'
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          RUN_ID="${{ steps.run.outputs.run_id }}"

          # Build payload entirely within jq (avoids shell expansion issues)
          PAYLOAD=$(jq --arg agentRunId "$RUN_ID" '{
            summary: (.summary // ""),
            metricsSnapshot: (.metricsSnapshot // {}),
            items: [.items[]? | {category, title, description, priority, isDevTask}],
            agentRunId: (if $agentRunId == "" then null else $agentRunId end)
          }' /tmp/po_report.json)

          echo "=== Submitting to API ==="
          RESPONSE=$(curl -s -X POST \
            -H "x-api-key: $SERVICE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$API_BASE/api/v1/po/reports")

          echo "$RESPONSE" | jq .

          if echo "$RESPONSE" | jq -e '.status == "success"' > /dev/null 2>&1; then
            echo "::notice::PO Report submitted successfully!"
          else
            echo "::error::Failed to submit PO report"
            exit 1
          fi

      - name: Complete agent run
        if: always()
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          RUN_ID="${{ steps.run.outputs.run_id }}"
          if [ -z "$RUN_ID" ]; then exit 0; fi

          if [ "${{ steps.generate.outputs.generate_ok }}" = "true" ]; then
            curl -s -X PATCH \
              -H "x-api-key: $SERVICE_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"status":"COMPLETED","summary":"Daily PO report generated with context-aware deduplication."}' \
              "$API_BASE/api/v1/agent-runs/$RUN_ID"
            echo "::notice::Agent run marked COMPLETED"
          else
            curl -s -X PATCH \
              -H "x-api-key: $SERVICE_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"status":"FAILED","errorMessage":"Failed to generate or parse PO report."}' \
              "$API_BASE/api/v1/agent-runs/$RUN_ID"
            echo "::warning::Agent run marked FAILED"
          fi
