name: Reset Stuck Suggestion

on:
  workflow_dispatch:
    inputs:
      suggestion_id:
        description: 'Suggestion ID to reset to PENDING'
        required: true
        type: string

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Reset suggestion to PENDING
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          curl -s -X PATCH \
            -H "x-api-key: $SERVICE_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"status":"PENDING","agentNotes":"Manual reset — previous run was cancelled."}' \
            "https://securelend-production.up.railway.app/api/v1/suggestions/${{ inputs.suggestion_id }}"
          echo "✓ Suggestion reset to PENDING"
