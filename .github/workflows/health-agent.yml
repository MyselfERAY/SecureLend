name: Health Agent

on:
  schedule:
    - cron: '0 3 * * *'        # 06:00 Turkey
    - cron: '0 9 * * *'        # 12:00 Turkey
    - cron: '0 15 * * *'       # 18:00 Turkey
    - cron: '0 21 * * *'       # 00:00 Turkey
  workflow_dispatch:           # Manual trigger

env:
  API_BASE: https://securelend-production.up.railway.app

concurrency:
  group: securelend-api-health
  cancel-in-progress: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Create Agent Run
        id: run
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          RUN_RESPONSE=$(curl -s -X POST \
            -H "x-api-key: $SERVICE_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"agentType":"HEALTH"}' \
            "$API_BASE/api/v1/agent-runs")

          echo "::notice::Agent run response: $RUN_RESPONSE"
          RUN_ID=$(echo "$RUN_RESPONSE" | jq -r '.data.id // empty')
          echo "::notice::RUN_ID=$RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Fetch API error analytics
        id: api_errors
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          API_DASHBOARD=$(curl -s -H "x-api-key: $SERVICE_API_KEY" \
            "$API_BASE/api/v1/analytics/api-dashboard?days=1")
          echo "$API_DASHBOARD" > /tmp/api_dashboard.json

          echo "::notice::API Dashboard raw: $(echo "$API_DASHBOARD" | jq -c '.data.summary // .status // "null"')"
          API_ERRORS=$(echo "$API_DASHBOARD" | jq '.data.summary.totalErrors // 0')
          echo "::notice::API errors (24h): $API_ERRORS"
          echo "api_error_count=$API_ERRORS" >> $GITHUB_OUTPUT

      - name: Fetch frontend error analytics
        id: fe_errors
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          FE_DASHBOARD=$(curl -s -H "x-api-key: $SERVICE_API_KEY" \
            "$API_BASE/api/v1/analytics/dashboard?days=1")
          echo "$FE_DASHBOARD" > /tmp/fe_dashboard.json

          FE_ERRORS=$(echo "$FE_DASHBOARD" | jq '.data.summary.totalErrors // 0')
          echo "::notice::Frontend errors (24h): $FE_ERRORS"
          echo "fe_error_count=$FE_ERRORS" >> $GITHUB_OUTPUT

      - name: Check if analysis needed
        id: check
        run: |
          API_ERRORS="${{ steps.api_errors.outputs.api_error_count }}"
          FE_ERRORS="${{ steps.fe_errors.outputs.fe_error_count }}"
          TOTAL=$((${API_ERRORS:-0} + ${FE_ERRORS:-0}))

          if [ "$TOTAL" -eq 0 ] 2>/dev/null; then
            echo "::notice::No errors in last 24h. System healthy."
            echo "needs_analysis=false" >> $GITHUB_OUTPUT
          else
            echo "::notice::Total errors: $TOTAL — analysis needed."
            echo "needs_analysis=true" >> $GITHUB_OUTPUT
          fi

      - name: Fetch existing suggestions (dedup)
        if: steps.check.outputs.needs_analysis == 'true'
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          SUGGESTIONS=$(curl -s -H "x-api-key: $SERVICE_API_KEY" \
            "$API_BASE/api/v1/suggestions")
          echo "$SUGGESTIONS" | jq -r '[.data[]? | select(.status != "DONE") | .title] | join("\n")' \
            2>/dev/null > /tmp/existing_suggestions.txt || echo "" > /tmp/existing_suggestions.txt

      - name: Install Claude Code CLI
        if: steps.check.outputs.needs_analysis == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Analyze errors and suggest fixes
        id: analyze
        if: steps.check.outputs.needs_analysis == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          API_DATA=$(cat /tmp/api_dashboard.json | jq '.data')
          FE_DATA=$(cat /tmp/fe_dashboard.json | jq '.data')
          EXISTING_SUGGESTIONS=$(cat /tmp/existing_suggestions.txt)
          TODAY=$(date -u +%Y-%m-%d)

          # ─── API error details ───
          API_SUMMARY=$(echo "$API_DATA" | jq -r '.summary | "API: \(.totalRequests) istek, \(.totalErrors) hata (%\(.errorRate)), Ort: \(.avgResponseTime)ms"')
          API_ERROR_ENDPOINTS=$(echo "$API_DATA" | jq -r '.errorEndpoints[:15][]? | "\(.endpoint): \(.count) hata"')
          API_RECENT_ERRORS=$(echo "$API_DATA" | jq -r '.recentErrors[:15][]? | "[\(.statusCode)] \(.method) \(.endpoint) — \(.errorMessage // "?")"')
          API_STATUS=$(echo "$API_DATA" | jq -r '.statusCodes[]? | "\(.code): \(.count)"')

          # ─── Frontend error details ───
          FE_SUMMARY=$(echo "$FE_DATA" | jq -r '.summary | "Frontend: \(.totalPageViews) goruntuleme, \(.totalErrors) hata"')
          FE_RECENT_ERRORS=$(echo "$FE_DATA" | jq -r '.recentErrors[:15][]? | "[\(.browser)/\(.device)] \(.page) — \(.errorMessage // "Bilinmeyen")"')

          PROMPT="Sen SecureLend (kiraguvence.com) platformunun Health Agent'isin. NestJS + Next.js + PostgreSQL + Prisma stack.

          SADECE gercek hata log'larini analiz et. Amacin: API veya frontend'de gercekten hata alan yerleri tespit edip fix onerisi vermek.

          == API OZETI ==
          $API_SUMMARY

          == API STATUS CODE DAGILIMI ==
          $API_STATUS

          == EN COK HATA VEREN API ENDPOINT'LERI ==
          $API_ERROR_ENDPOINTS

          == SON API HATALARI (4xx/5xx) ==
          $API_RECENT_ERRORS

          == FRONTEND OZETI ==
          $FE_SUMMARY

          == SON FRONTEND HATALARI ==
          $FE_RECENT_ERRORS

          == MEVCUT ONERILER (TEKRARLAMA!) ==
          $EXISTING_SUGGESTIONS

          == GOREV ==
          SADECE gercek hatalari (4xx/5xx HTTP response, frontend runtime error) analiz et.

          KESINLIKLE YAPMA:
          - Performans iyilestirmesi onerme (yavas endpoint vs.)
          - Refactoring onerme
          - Kod kalitesi / best practice onerisi verme
          - Loglama, monitoring, test ekleme onerme
          - Hata OLMAYAN durumlarda oneri uretme
          - Mevcut kodu 'iyilestirme' amaciyla degistirme onerisi

          SADECE SU DURUMLARDA ONERI URET:
          1. API 500 hatasi (server crash, unhandled exception)
          2. API 4xx hatasi (ancak client bug'indan kaynaklaniyorsa — ornegin yanlis route, eksik validation)
          3. Frontend runtime error (ekran crash, render hatasi, caught exception)
          4. Gercek bir bug olduguna emin oldugun durumlar

          KURALLAR:
          1. TEKRAR YASAGI: Mevcut oneriler listesindeki konulari tekrarlama.
          2. Her oneri somut bir BUG FIX icerecek — dosya adi, fonksiyon, ne degismeli.
          3. Oncelik: CRITICAL (500, veri kaybi), HIGH (tekrarlayan 4xx bug), MEDIUM (ara sira olan hata)
          4. Maks 3 oneri. Gercek hata yoksa BOS suggestions dizisi dondur [].
          5. Emin degilsen oneri URETME. Yanlis fix onerisi uretmek, sistemi bozabilir.

          == CIKTI FORMATI ==
          Sadece gecerli JSON dondur:
          {
            \"analysis\": \"<h2>Saglik Raporu — $TODAY</h2><p>Turkce, sadece hata ozeti, maks 200 kelime</p>\",
            \"suggestions\": [
              {
                \"title\": \"Kisa baslik (maks 200 karakter)\",
                \"description\": \"Detayli bug aciklamasi ve fix\",
                \"priority\": \"MEDIUM|HIGH|CRITICAL\"
              }
            ]
          }"

          echo "=== Analyzing Errors ==="
          RESULT=$(claude --print --dangerously-skip-permissions "$PROMPT" 2>&1)

          echo "$RESULT" > /tmp/claude_raw.txt
          cat > /tmp/extract_json.js << 'NODESCRIPT'
          const fs = require("fs");
          const INPUT = process.argv[2] || "/tmp/claude_raw.txt";
          const OUTPUT = process.argv[3] || "/tmp/output.json";
          let d = fs.readFileSync(INPUT, "utf8");
          d = d.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
          const first = d.indexOf("{");
          const last = d.lastIndexOf("}");
          if (first < 0 || last <= first) { process.stderr.write("No JSON object found\n"); process.exit(1); }
          let raw = d.substring(first, last + 1);
          try { const j = JSON.parse(raw); fs.writeFileSync(OUTPUT, JSON.stringify(j)); process.exit(0); } catch(e) { process.stderr.write("Attempt 1: " + e.message + "\n"); }
          let fixed = raw.replace(/[\x00-\x1f]/g, (ch) => {
            if (ch === "\n") return "\\n"; if (ch === "\r") return "\\r"; if (ch === "\t") return "\\t"; return "";
          });
          try { const j = JSON.parse(fixed); fs.writeFileSync(OUTPUT, JSON.stringify(j)); process.exit(0); } catch(e) { process.stderr.write("Attempt 2: " + e.message + "\n"); }
          try {
            const getField = (name) => { const re = new RegExp('"' + name + '"\\s*:\\s*"'); const m = re.exec(fixed); if (!m) return ""; let start = m.index + m[0].length, esc = false; for (let i = start; i < fixed.length; i++) { if (esc) { esc = false; continue; } if (fixed[i] === "\\") { esc = true; continue; } if (fixed[i] === '"') return fixed.substring(start, i); } return ""; };
            const arrMatch = fixed.match(/"suggestions"\s*:\s*(\[[\s\S]*\])\s*\}?\s*$/);
            let arr = []; if (arrMatch) { try { arr = JSON.parse(arrMatch[1]); } catch(e) {} }
            const obj = { analysis: getField("analysis"), suggestions: arr };
            if (obj.analysis) { fs.writeFileSync(OUTPUT, JSON.stringify(obj)); process.stderr.write("Recovered via field extraction\n"); process.exit(0); }
          } catch(e) { process.stderr.write("Attempt 3: " + e.message + "\n"); }
          process.exit(1);
          NODESCRIPT
          node /tmp/extract_json.js /tmp/claude_raw.txt /tmp/health_report.json 2>&1 || true

          if [ ! -s /tmp/health_report.json ]; then
            echo "::error::Failed to extract valid JSON"
            echo "analyze_ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          SCOUNT=$(cat /tmp/health_report.json | jq '[.suggestions[]?] | length' 2>/dev/null || echo "0")
          echo "::notice::Analysis complete — $SCOUNT suggestions"
          echo "analyze_ok=true" >> $GITHUB_OUTPUT

      - name: Create suggestions as PENDING (auto-approved for dev agent)
        if: steps.analyze.outputs.analyze_ok == 'true'
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          REPORT=$(cat /tmp/health_report.json)
          SUGGESTION_COUNT=$(echo "$REPORT" | jq '[.suggestions[]?] | length')

          if [ "$SUGGESTION_COUNT" -eq 0 ] 2>/dev/null; then
            echo "::notice::No suggestions needed — system healthy."
            exit 0
          fi

          echo "::notice::Creating $SUGGESTION_COUNT suggestions (only CRITICAL/HIGH auto-approved)..."

          SUBMITTED=0
          echo "$REPORT" | jq -c '.suggestions[]?' | while read -r SUGGESTION; do
            TITLE=$(echo "$SUGGESTION" | jq -r '.title')
            DESC=$(echo "$SUGGESTION" | jq -r '.description')
            PRIORITY=$(echo "$SUGGESTION" | jq -r '.priority // "MEDIUM"')

            # Step 1: Create suggestion (defaults to REJECTED)
            CREATE_PAYLOAD=$(jq -n \
              --arg title "[Health] $TITLE" \
              --arg description "$DESC" \
              --arg priority "$PRIORITY" \
              '{title: $title, description: $description, priority: $priority}')

            CREATE_RESPONSE=$(curl -s -X POST \
              -H "x-api-key: $SERVICE_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$CREATE_PAYLOAD" \
              "$API_BASE/api/v1/suggestions")

            SID=$(echo "$CREATE_RESPONSE" | jq -r '.data.id // empty')

            if [ -n "$SID" ] && [ "$SID" != "null" ]; then
              # Step 2: Only auto-approve CRITICAL and HIGH — MEDIUM stays REJECTED for manual review
              if [ "$PRIORITY" = "CRITICAL" ] || [ "$PRIORITY" = "HIGH" ]; then
                curl -s -X PATCH \
                  -H "x-api-key: $SERVICE_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d '{"status":"PENDING"}' \
                  "$API_BASE/api/v1/suggestions/$SID" > /dev/null
                echo "::notice::Auto-approved ($PRIORITY): $TITLE (id: $SID)"
              else
                echo "::notice::Created but NOT auto-approved ($PRIORITY): $TITLE (id: $SID)"
              fi
              SUBMITTED=$((SUBMITTED + 1))
            else
              echo "::warning::Failed to create: $TITLE"
            fi
          done

      # ══════════════════════════════════════════
      # Architecture Staleness Check
      # ══════════════════════════════════════════
      - name: Check architecture staleness
        id: arch_check
        run: |
          # Son Architect çalışma tarihini GitHub API'den al
          LAST_ARCH_RUN=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/architect-agent.yml/runs?status=completed&per_page=1" \
            | jq -r '.workflow_runs[0].created_at // "1970-01-01T00:00:00Z"')

          # Son commit tarihini al
          LAST_COMMIT=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/main" \
            | jq -r '.commit.committer.date // "1970-01-01T00:00:00Z"')

          echo "::notice::Architect last run: $LAST_ARCH_RUN"
          echo "::notice::Last commit: $LAST_COMMIT"

          # Architect çalışmamışsa tetikle
          if [[ "$LAST_COMMIT" > "$LAST_ARCH_RUN" ]]; then
            echo "::notice::Architecture stale — Architect Agent tetiklenecek"
            echo "arch_stale=true" >> $GITHUB_OUTPUT
          else
            echo "::notice::Architecture güncel"
            echo "arch_stale=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Architect Agent (update mode)
        if: steps.arch_check.outputs.arch_stale == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'architect-agent.yml',
              ref: 'main',
              inputs: { mode: 'update_only' }
            });
            console.log('Architect Agent triggered in update_only mode');

      - name: Complete agent run
        if: always()
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          RUN_ID="${{ steps.run.outputs.run_id }}"
          if [ -z "$RUN_ID" ]; then exit 0; fi

          NEEDS="${{ steps.check.outputs.needs_analysis }}"
          ANALYZE_OK="${{ steps.analyze.outputs.analyze_ok }}"

          if [ "$NEEDS" = "false" ]; then
            curl -s -X PATCH \
              -H "x-api-key: $SERVICE_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"status":"COMPLETED","summary":"No errors in last 24h. System healthy."}' \
              "$API_BASE/api/v1/agent-runs/$RUN_ID"
          elif [ "$ANALYZE_OK" = "true" ]; then
            SCOUNT=$(cat /tmp/health_report.json | jq '[.suggestions[]?] | length' 2>/dev/null || echo "0")
            curl -s -X PATCH \
              -H "x-api-key: $SERVICE_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"status\":\"COMPLETED\",\"summary\":\"Health analysis done. $SCOUNT auto-approved fix suggestions created.\"}" \
              "$API_BASE/api/v1/agent-runs/$RUN_ID"
          else
            curl -s -X PATCH \
              -H "x-api-key: $SERVICE_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"status":"FAILED","errorMessage":"Failed to analyze errors."}' \
              "$API_BASE/api/v1/agent-runs/$RUN_ID"
          fi
