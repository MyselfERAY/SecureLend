name: Marketing Agent - Strategy & Research

on:
  schedule:
    - cron: '0 6 * * 1-5'     # Weekdays at 06:00 UTC (09:00 Turkey)
  workflow_dispatch:
    inputs:
      research_topic:
        description: 'Research topic (leave empty for daily strategy)'
        required: false
        default: ''

env:
  API_BASE: https://securelend-production.up.railway.app

concurrency:
  group: securelend-marketing
  cancel-in-progress: false

jobs:
  marketing-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Create Agent Run
        id: run
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          RUN_RESPONSE=$(curl -s -X POST \
            -H "x-api-key: $SERVICE_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"agentType":"MARKETING"}' \
            "$API_BASE/api/v1/agent-runs")

          if ! echo "$RUN_RESPONSE" | jq . > /dev/null 2>&1; then
            echo "::warning::Agent run creation returned non-JSON, skipping run tracking"
            echo "run_id=" >> $GITHUB_OUTPUT
          else
            RUN_ID=$(echo "$RUN_RESPONSE" | jq -r '.data.id // empty')
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          fi

      - name: Determine mode
        id: mode
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          MANUAL_TOPIC="${{ github.event.inputs.research_topic }}"

          if [ -n "$MANUAL_TOPIC" ]; then
            echo "mode=research" >> $GITHUB_OUTPUT
            echo "$MANUAL_TOPIC" > /tmp/research_topic.txt
            echo "" > /tmp/research_details.txt
            echo "research_id=" >> $GITHUB_OUTPUT
            echo "::notice::Research mode: $MANUAL_TOPIC"
            exit 0
          fi

          # Check for pending research requests
          PENDING=$(curl -s -H "x-api-key: $SERVICE_API_KEY" \
            "$API_BASE/api/v1/marketing/research")

          FIRST_PENDING=$(echo "$PENDING" | jq -r '[.data[]? | select(.status == "PENDING")] | .[0] // empty')

          if [ -n "$FIRST_PENDING" ] && [ "$FIRST_PENDING" != "null" ]; then
            TOPIC=$(echo "$FIRST_PENDING" | jq -r '.topic')
            DETAILS=$(echo "$FIRST_PENDING" | jq -r '.details // ""')
            RID=$(echo "$FIRST_PENDING" | jq -r '.id')
            echo "$TOPIC" > /tmp/research_topic.txt
            echo "$DETAILS" > /tmp/research_details.txt
            echo "mode=research" >> $GITHUB_OUTPUT
            echo "research_id=$RID" >> $GITHUB_OUTPUT
            echo "::notice::Research mode (from queue): $TOPIC"
          else
            echo "mode=daily" >> $GITHUB_OUTPUT
            echo "research_id=" >> $GITHUB_OUTPUT
            echo "::notice::Daily strategy mode"
          fi

      - name: Fetch agent context
        id: context
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          CONTEXT=$(curl -s -H "x-api-key: $SERVICE_API_KEY" \
            "$API_BASE/api/v1/marketing/agent-context")
          echo "$CONTEXT" > /tmp/mkt_context.json
          echo "::notice::Context loaded: $(echo "$CONTEXT" | jq '.data.totalReportsInLast7Days // 0' 2>/dev/null) recent reports"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate daily strategy
        id: daily
        if: steps.mode.outputs.mode == 'daily'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          CONTEXT_RAW=$(cat /tmp/mkt_context.json)
          CONTEXT=$(echo "$CONTEXT_RAW" | jq -r '.data // empty')
          DAY_OF_WEEK=$(echo "$CONTEXT" | jq -r '.dayOfWeek // "Monday"')

          RECENT_REPORTS=$(echo "$CONTEXT" | jq -r '.recentReportTitles // [] | .[]' 2>/dev/null | head -10)
          RECENT_TASKS=$(echo "$CONTEXT" | jq -r '.recentTaskTitles // [] | .[]' 2>/dev/null | head -30)
          PENDING_TASKS=$(echo "$CONTEXT" | jq -r '.pendingTasks // [] | .[]' 2>/dev/null | head -15)
          COMPLETED_TASKS=$(echo "$CONTEXT" | jq -r '.completedTasks // [] | .[]' 2>/dev/null | head -10)

          PROMPT="Sen SecureLend (kiraguvence.com) platformunun Pazarlama ve Is Gelistirme Direktoru ajanisin. Turk fintech kira odeme ve KMH platformu.

          Tarih: $TODAY ($DAY_OF_WEEK)

          == SON 7 GUNUN RAPOR BASLIKLARI (TEKRARLAMA!) ==
          $RECENT_REPORTS

          == SON 7 GUNDE ONERILEN GOREVLER (TEKRARLAMA!) ==
          $RECENT_TASKS

          == BEKLEYEN GOREVLER (henuz yapilmamis) ==
          $PENDING_TASKS

          == SON TAMAMLANAN GOREVLER ==
          $COMPLETED_TASKS

          == GOREV ==
          Yukaridaki baglami inceleyerek bugun icin TAZE ve OZGUN bir pazarlama raporu uret.

          KRITIK KURALLAR:
          1. TEKRAR YASAGI: Son 7 gundeki rapor basliklari ve gorev basliklarini ASLA tekrarlama. Ayni konuyu farkli kelimelerle de yazma.
          2. BEKLEYEN GOREVLERE REFERANS: Bekleyen gorevlerden bahsedebilirsin (takip/guncelleme olarak) ama yeni gorev olarak tekrarlama.
          3. GUN ODAGI — her gun farkli ana tema:
             - Monday: Haftalik strateji ve kampanya planlamasi
             - Tuesday: Sosyal medya ve icerik pazarlamasi
             - Wednesday: Rakip analizi ve pazar trendi (her seferinde FARKLI rakip)
             - Thursday: Kullanici edinimi ve donusum optimizasyonu
             - Friday: Is birlikleri, banka ve emlak sektoru iliskileri
          4. Bugün $DAY_OF_WEEK — bu temanin agirligini artir.
          5. Rakip analizinde her raporda FARKLI bir rakip veya pazar segmenti sec.
          6. 3-6 somut, uygulanabilir gorev uret (genel tavsiyeler degil).
          7. Tamamlanan gorevlerin etkisini degerlendir (varsa).

          == CIKTI FORMATI ==
          Sadece gecerli JSON dondur:
          {
            \"type\": \"DAILY_STRATEGY\",
            \"title\": \"$TODAY - [Gunun ana temasi, kisa ve ozgun baslik]\",
            \"content\": \"<h2>...</h2><p>... (Turkce, zengin HTML, maks 1500 kelime)</p>\",
            \"tasks\": [
              {\"title\": \"Somut gorev basligi\", \"description\": \"Detayli aciklama — ne, nasil, beklenen etki\"}
            ]
          }"

          echo "=== Generating Daily Strategy ==="
          RESULT=$(claude --print --dangerously-skip-permissions "$PROMPT" 2>&1)

          JSON_RESULT=$(echo "$RESULT" | sed -n '/^{/,/^}/p' | head -300)
          if [ -z "$JSON_RESULT" ]; then
            JSON_RESULT=$(echo "$RESULT" | sed -n '/```json/,/```/p' | grep -v '```')
          fi

          if [ -z "$JSON_RESULT" ]; then
            echo "::error::Failed to extract JSON"
            echo "generate_ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$JSON_RESULT" > /tmp/marketing_report.json
          echo "generate_ok=true" >> $GITHUB_OUTPUT

      - name: Generate research report
        id: research
        if: steps.mode.outputs.mode == 'research'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TOPIC=$(cat /tmp/research_topic.txt)
          DETAILS=$(cat /tmp/research_details.txt)
          TODAY=$(date -u +%Y-%m-%d)

          PROMPT="Sen SecureLend (kiraguvence.com) icin kidemli pazar arastirma analistisin. Turk fintech kira odeme platformu.

          == ARASTIRMA KONUSU ==
          $TOPIC

          == EK BAGLAIM ==
          $DETAILS

          Kapsamli, veri odakli bir arastirma raporu uret.

          == CIKTI FORMATI ==
          Sadece gecerli JSON dondur:
          {
            \"type\": \"RESEARCH\",
            \"title\": \"Arastirma: $TOPIC\",
            \"content\": \"<full HTML arastirma raporu — h2/h3, tablo, liste, strong>\",
            \"tasks\": [
              {\"title\": \"Aksiyon maddesi\", \"description\": \"Detay\"}
            ]
          }

          == KURALLAR ==
          1. Tamamen Turkce yaz.
          2. GERCEK, dogrulanabilir pazar verisi kullan. Gercek Turk sirketleri, regülasyonlar, istatistikler.
          3. Karsilastirma tablolari ekle (ornegin rakip fiyatlama, ozellik karsilastirmasi).
          4. Veri kesin degilse 'Tahmini veri' olarak belirt.
          5. Yapi: Yonetici Ozeti → Pazar Genel Bakis → Detayli Analiz → Rekabet → Oneriler → Aksiyonlar.
          6. 2-5 uygulanabilir gorev turetin.
          7. Zengin HTML formatlama, tablolar, listeler.
          8. Maks 3000 kelime.
          9. Sadece JSON dondur."

          echo "=== Generating Research Report ==="
          RESULT=$(claude --print --dangerously-skip-permissions "$PROMPT" 2>&1)

          JSON_RESULT=$(echo "$RESULT" | sed -n '/^{/,/^}/p' | head -400)
          if [ -z "$JSON_RESULT" ]; then
            JSON_RESULT=$(echo "$RESULT" | sed -n '/```json/,/```/p' | grep -v '```')
          fi

          if [ -z "$JSON_RESULT" ]; then
            echo "::error::Failed to extract JSON"
            echo "generate_ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$JSON_RESULT" > /tmp/marketing_report.json
          echo "generate_ok=true" >> $GITHUB_OUTPUT

      - name: Submit report to API
        id: submit
        if: steps.daily.outputs.generate_ok == 'true' || steps.research.outputs.generate_ok == 'true'
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          REPORT=$(cat /tmp/marketing_report.json)
          RUN_ID="${{ steps.run.outputs.run_id }}"

          TYPE=$(echo "$REPORT" | jq -r '.type // "DAILY_STRATEGY"')
          TITLE=$(echo "$REPORT" | jq -r '.title // "Marketing Report"')
          CONTENT=$(echo "$REPORT" | jq -r '.content // ""')
          TASKS=$(echo "$REPORT" | jq '[.tasks[]? | {title, description}]')

          PAYLOAD=$(jq -n \
            --arg type "$TYPE" \
            --arg title "$TITLE" \
            --arg content "$CONTENT" \
            --argjson tasks "$TASKS" \
            --arg agentRunId "$RUN_ID" \
            '{type: $type, title: $title, content: $content, tasks: $tasks, agentRunId: (if $agentRunId == "" then null else $agentRunId end)}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-api-key: $SERVICE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$API_BASE/api/v1/marketing/reports")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if ! echo "$BODY" | jq . > /dev/null 2>&1; then
            echo "::error::API returned non-JSON (HTTP $HTTP_CODE): $(echo "$BODY" | head -5)"
            echo "submit_ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$BODY" | jq .

          if echo "$BODY" | jq -e '.status == "success"' > /dev/null 2>&1; then
            REPORT_ID=$(echo "$BODY" | jq -r '.data.id')
            echo "report_id=$REPORT_ID" >> $GITHUB_OUTPUT
            echo "submit_ok=true" >> $GITHUB_OUTPUT
            echo "::notice::Marketing report submitted: $REPORT_ID"
          else
            echo "::error::Failed to submit marketing report"
            echo "submit_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Link research request
        if: steps.submit.outputs.submit_ok == 'true' && steps.mode.outputs.research_id != ''
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          RID="${{ steps.mode.outputs.research_id }}"
          REPORT_ID="${{ steps.submit.outputs.report_id }}"

          LINK_RESPONSE=$(curl -s -X PATCH \
            -H "x-api-key: $SERVICE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"resultReportId\":\"$REPORT_ID\"}" \
            "$API_BASE/api/v1/marketing/research/$RID/complete")

          if echo "$LINK_RESPONSE" | jq -e '.status == "success"' > /dev/null 2>&1; then
            echo "::notice::Research request $RID linked to report $REPORT_ID"
          else
            echo "::warning::Failed to link research request $RID: $LINK_RESPONSE"
          fi

      - name: Complete agent run
        if: always()
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          RUN_ID="${{ steps.run.outputs.run_id }}"
          if [ -z "$RUN_ID" ]; then exit 0; fi

          GEN_OK="${{ steps.daily.outputs.generate_ok }}${{ steps.research.outputs.generate_ok }}"

          if echo "$GEN_OK" | grep -q "true"; then
            curl -s -X PATCH \
              -H "x-api-key: $SERVICE_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"status":"COMPLETED","summary":"Marketing report generated with context-aware deduplication."}' \
              "$API_BASE/api/v1/agent-runs/$RUN_ID"
          else
            curl -s -X PATCH \
              -H "x-api-key: $SERVICE_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"status":"FAILED","errorMessage":"Failed to generate marketing report."}' \
              "$API_BASE/api/v1/agent-runs/$RUN_ID"
          fi
